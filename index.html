<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>给最可爱的小羊 💫</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow-x: hidden; }

  body {
    font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  canvas#stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .main-scroll {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* 顶部标题 */
  .header-title {
    color: #ffd6e7;
    font-size: 14px;
    letter-spacing: 6px;
    opacity: 0.7;
    animation: fadeIn 1.5s ease;
  }

  /* 表白文字 */
  .love-text {
    color: #ffe8f2;
    text-align: center;
    line-height: 2;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 1px;
    max-width: 360px;
    opacity: 0;
    animation: fadeIn 2s ease 0.3s forwards;
  }
  .love-text .name { font-size: 20px; font-weight: 600; color: #ffb8d4; display: block; margin-bottom: 8px; }

  /* 合照相册 */
  .photo-album {
    width: 100%;
    max-width: 320px;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: fadeIn 1.8s ease 0.5s forwards;
    opacity: 0;
  }
  .photo-track {
    display: flex;
    transition: transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .photo-slide {
    min-width: 100%;
  }
  .photo-slide img {
    width: 100%;
    display: block;
    border-radius: 16px;
  }
  .photo-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }
  .photo-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: all 0.3s ease;
  }
  .photo-dot.active {
    background: #fff;
    width: 18px;
    border-radius: 3px;
  }

  /* 美甲誓言 */
  .nail-vow {
    color: #ffd6e7;
    text-align: center;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    opacity: 0;
    animation: fadeIn 2s ease 1s forwards;
  }

  /* iPad 奖品位 */
  .ipad-wrapper {
    position: relative;
    width: 200px;
    transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .ipad-wrapper.unlocked { transform: scale(1.08); }

  .ipad-body {
    background: linear-gradient(145deg, #c0c5ce, #8a8f98);
    border-radius: 18px;
    padding: 10px 8px;
    box-shadow:
      0 0 20px rgba(180,190,210,0.3),
      0 8px 32px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .ipad-screen {
    background: #1a1a2e;
    border-radius: 10px;
    aspect-ratio: 4/3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: background 1s ease, box-shadow 1s ease;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
  }
  .ipad-screen.unlocked-screen {
    background: radial-gradient(ellipse at center, #1e2a4a 0%, #0d1b3f 60%, #0a0a1a 100%);
    box-shadow: inset 0 0 60px rgba(80,120,255,0.2), 0 0 30px rgba(120,160,255,0.3);
  }

  .ipad-question {
    font-size: 48px;
    color: rgba(255,255,255,0.15);
    font-weight: 700;
    transition: all 0.6s ease;
  }

  .ipad-prize {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .ipad-prize.show { display: flex; }
  .ipad-gift { font-size: 42px; }
  .ipad-congrats {
    color: #ffd700;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(255,215,0,0.6);
    animation: glow 1.5s ease-in-out infinite alternate;
  }
  .ipad-sub { color: #aac4ff; font-size: 10px; letter-spacing: 1px; opacity: 0.8; }

  .ipad-led {
    width: 4px; height: 4px;
    background: #66ff66;
    border-radius: 50%;
    margin: 6px auto 0;
    box-shadow: 0 0 6px #66ff66;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .ipad-led.on { opacity: 1; }

  /* 盲盒区域 */
  .boxes-section {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .blind-box {
    width: 80px;
    height: 90px;
    position: relative;
    cursor: pointer;
    perspective: 400px;
    transition: transform 0.3s ease;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    border: none;
    outline: none;
    background: none;
    font: inherit;
    color: inherit;
    -webkit-appearance: none;
  }
  .blind-box:active { transform: scale(0.95); }
  .blind-box.opened { pointer-events: none; opacity: 0.6; pointer-events: none; }
  .blind-box.prize-opened { pointer-events: none; }

  .box-3d {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s ease;
  }

  .box-face {
    position: absolute;
    border-radius: 6px;
  }

  .box-front {
    width: 72px; height: 72px;
    background: var(--box-color);
    bottom: 0; left: 4px;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .box-question {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 26px; font-weight: 700;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    pointer-events: none;
  }

  .box-lid {
    width: 80px; height: 20px;
    background: var(--box-color-dark);
    top: -2px; left: 0;
    border-radius: 10px 10px 4px 4px;
    transform-origin: right bottom;
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 -2px 8px rgba(0,0,0,0.2);
    pointer-events: none;
  }
  .blind-box.opening .box-lid {
    transform: rotateX(-130deg) translateY(-10px);
  }

  .box-ribbon {
    position: absolute;
    width: 14px; height: 20px;
    background: var(--ribbon-color);
    top: -8px; left: 33px;
    border-radius: 3px 3px 0 0;
    z-index: 2;
    pointer-events: none;
  }

  .box-1 { --box-color: #ff9eb5; --box-color-dark: #e07d95; --ribbon-color: #ffd1dc; }
  .box-2 { --box-color: #b19cd9; --box-color-dark: #8b76c4; --ribbon-color: #dfd1ff; }
  .box-3 { --box-color: #7ec8e3; --box-color-dark: #5da8c8; --ribbon-color: #c5e8f7; }

  /* 弹窗卡牌 */
  .card-popup {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    background: rgba(20,20,50,0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 30px 24px;
    z-index: 100;
    text-align: center;
    color: #ffe8f2;
    font-size: 16px;
    line-height: 1.8;
    max-width: 280px;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .card-popup.show {
    transform: translate(-50%,-50%) scale(1);
  }
  .card-popup .card-emoji { font-size: 48px; display: block; margin-bottom: 10px; }
  .card-popup .card-close {
    margin-top: 16px; font-size: 12px; color: rgba(255,255,255,0.4);
  }

  /* 撒花容器 */
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 99;
  }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  /* 音乐按钮 */
  .music-btn {
    position: fixed;
    bottom: 30px; right: 20px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 50;
    transition: all 0.3s ease;
  }
  .music-btn:active { background: rgba(255,255,255,0.2); }

  /* 遮罩 */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  /* 生日标识 */
  .birthday-badge {
    color: #ffd700;
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0;
    animation: fadeIn 1.5s ease 2.5s forwards;
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes glow {
    from { text-shadow: 0 0 10px rgba(255,215,0,0.4); }
    to { text-shadow: 0 0 25px rgba(255,215,0,0.8), 0 0 40px rgba(255,200,100,0.4); }
  }
  @keyframes confettiFall {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px) rotate(-3deg); }
    40% { transform: translateX(6px) rotate(3deg); }
    60% { transform: translateX(-4px) rotate(-2deg); }
    80% { transform: translateX(4px) rotate(2deg); }
  }

  @keyframes float {
    0%,100% { top: 0px; }
    50% { top: -8px; }
  }
  @keyframes floatSlow {
    0%,100% { top: 0px; }
    50% { top: -4px; }
  }
  .ipad-wrapper { animation: floatSlow 4s ease-in-out infinite; }
  .blind-box { animation: float 3s ease-in-out infinite; }
  .blind-box:nth-child(2) { animation-delay: 0.5s; }
  .blind-box:nth-child(3) { animation-delay: 1s; }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="main-scroll">

  <div class="header-title">✨ 给 最 可 爱 的 你 ✨</div>

  <div class="photo-album" id="photoAlbum">
    <div class="photo-track" id="photoTrack">
      <div class="photo-slide">
        <img src="7fcd6564888a94df657a8a33f71d0633.jpg" alt="合照1">
      </div>
    </div>
    <div class="photo-dots" id="photoDots"></div>
  </div>

  <div class="nail-vow">一个立誓陪你做100次美甲的男人 💅</div>

  <div class="love-text" id="loveText">
    <span class="name">小羊 🐑</span>
    乖宝，这些日子总是吵吵闹闹，<br>
    但是无论多少次争吵也改变不了爱你的决心。<br>
    希望我们能越来越好，携手共行，<br>
    一直一直走下去。
  </div>

  <div class="ipad-wrapper" id="ipadWrapper">
    <div class="ipad-body">
      <div class="ipad-screen" id="ipadScreen">
        <div class="ipad-question" id="ipadQuestion">?</div>
        <div class="ipad-prize" id="ipadPrize">
          <span class="ipad-gift">🎁</span>
          <span class="ipad-congrats">恭喜你中奖啦！</span>
          <span class="ipad-sub">获得iPad一台～</span>
        </div>
      </div>
      <div class="ipad-led" id="ipadLed"></div>
    </div>
  </div>

  <div class="birthday-badge" id="birthdayBadge"></div>

  <div class="boxes-section" id="boxesSection">
    <button type="button" class="blind-box box-1" data-box="1">
      <div class="box-ribbon"></div>
      <div class="box-lid"></div>
      <div class="box-face box-front">
        <div class="box-question">?</div>
      </div>
    </button>
    <button type="button" class="blind-box box-2" data-box="2">
      <div class="box-ribbon"></div>
      <div class="box-lid"></div>
      <div class="box-face box-front">
        <div class="box-question">?</div>
      </div>
    </button>
    <button type="button" class="blind-box box-3" data-box="3">
      <div class="box-ribbon"></div>
      <div class="box-lid"></div>
      <div class="box-face box-front">
        <div class="box-question">?</div>
      </div>
    </button>
  </div>

</div>

<div class="overlay" id="overlay" onclick="closeCard()"></div>
<div class="card-popup" id="cardPopup"></div>
<div class="confetti-container" id="confettiContainer"></div>

<button class="music-btn" id="musicBtn">🎵</button>

<script>
(function() {
  // ==================== STARRY SKY CANVAS ====================
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let meteors = [];
  let fireworks = [];
  const STAR_COUNT = 220;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.8 + 0.5,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinkleOffset: Math.random() * Math.PI * 2,
        twinkleAmp: Math.random() * 0.6 + 0.2
      });
    }
  }
  initStars();

  function spawnMeteor() {
    meteors.push({
      x: Math.random() * canvas.width * 0.8,
      y: Math.random() * canvas.height * 0.3,
      len: Math.random() * 80 + 50,
      speed: Math.random() * 6 + 4,
      life: 1,
      dx: Math.random() * -2 - 3,
      dy: Math.random() * 1 + 1
    });
  }

  function spawnFirework(cx, cy) {
    const count = 40;
    const colors = ['#ff6b9d','#ffd700','#ff9ec4','#c4a4ff','#7ec8e3','#ffb347','#ff6b6b'];
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count;
      const speed = Math.random() * 4 + 2;
      fireworks.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        color: colors[Math.floor(Math.random() * colors.length)],
        r: Math.random() * 2 + 1.5
      });
    }
  }

  function drawStars(time) {
    stars.forEach(s => {
      const alpha = 0.3 + s.twinkleAmp + Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * s.twinkleAmp;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,240,${Math.min(1, alpha)})`;
      ctx.fill();

      if (s.r > 1.3 && alpha > 0.7) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,240,${alpha * 0.08})`;
        ctx.fill();
      }
    });
  }

  function drawMeteors() {
    meteors = meteors.filter(m => m.life > 0);
    meteors.forEach(m => {
      const grad = ctx.createLinearGradient(m.x, m.y, m.x + m.dx * m.len, m.y + m.dy * m.len);
      grad.addColorStop(0, `rgba(255,255,255,${m.life})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(m.x + m.dx * m.len, m.y + m.dy * m.len);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      m.x += m.dx * m.speed * 0.015;
      m.y += m.dy * m.speed * 0.015;
      m.life -= 0.008;
    });
  }

  function drawFireworks() {
    fireworks = fireworks.filter(f => f.life > 0);
    fireworks.forEach(f => {
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fillStyle = f.color.replace(')', `,${f.life})`).replace('rgb', 'rgba');
      if (f.color.startsWith('#')) {
        ctx.fillStyle = f.color;
        ctx.globalAlpha = f.life;
      }
      ctx.fill();
      ctx.globalAlpha = 1;
      f.x += f.vx;
      f.y += f.vy;
      f.vy += 0.04;
      f.life -= 0.015;
    });
  }

  let time = 0;
  let meteorTimer = 0;
  let fireworkTimer = 0;
  let isBirthday = false;

  function animate(ts) {
    time = ts;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawStars(time);
    drawMeteors();
    drawFireworks();

    meteorTimer += 1;
    if (meteorTimer > Math.random() * 200 + 180) {
      spawnMeteor();
      meteorTimer = 0;
    }

    if (isBirthday) {
      fireworkTimer += 1;
      if (fireworkTimer > 60) {
        spawnFirework(
          Math.random() * canvas.width,
          Math.random() * canvas.height * 0.5
        );
        fireworkTimer = 0;
      }
    }

    requestAnimationFrame(animate);
  }

  // ==================== BIRTHDAY CHECK ====================
  function checkBirthday() {
    const now = new Date();
    if (now.getMonth() === 5 && now.getDate() === 21) {
      isBirthday = true;
      document.getElementById('birthdayBadge').textContent = '🎂 小羊生日快乐！🎂';
      setTimeout(() => spawnFirework(canvas.width/2, canvas.height/3), 500);
    }
  }
  checkBirthday();

  // ==================== MUSIC ====================
  let audioCtx = null;
  let musicPlaying = false;
  let musicInterval = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  const melodyNotes = [
    { freq: 523, dur: 0.4 }, { freq: 659, dur: 0.4 }, { freq: 784, dur: 0.4 },
    { freq: 1047, dur: 0.6 }, { freq: 784, dur: 0.3 }, { freq: 1047, dur: 0.8 },
    { freq: 988, dur: 0.4 }, { freq: 784, dur: 0.4 }, { freq: 659, dur: 0.4 },
    { freq: 523, dur: 0.6 }, { freq: 659, dur: 0.3 }, { freq: 784, dur: 0.8 },
    { freq: 659, dur: 0.4 }, { freq: 523, dur: 0.4 }, { freq: 440, dur: 0.4 },
    { freq: 523, dur: 0.8 }, { freq: 330, dur: 0.4 }, { freq: 392, dur: 1.2 },
    { freq: 523, dur: 0.4 }, { freq: 659, dur: 0.4 }, { freq: 784, dur: 0.6 },
    { freq: 659, dur: 0.3 }, { freq: 523, dur: 0.6 }, { freq: 440, dur: 0.3 },
    { freq: 523, dur: 1.0 }, { freq: 659, dur: 0.5 }, { freq: 784, dur: 0.5 },
    { freq: 659, dur: 1.2 }, { freq: 523, dur: 1.5 },
  ];

  let noteIndex = 0;
  function playMelody() {
    if (!musicPlaying || !audioCtx) return;
    if (noteIndex >= melodyNotes.length) noteIndex = 0;

    const note = melodyNotes[noteIndex];
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = note.freq;
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + note.dur);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + note.dur);
    noteIndex++;
  }

  function toggleMusic() {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    musicPlaying = !musicPlaying;
    const btn = document.getElementById('musicBtn');
    btn.textContent = musicPlaying ? '🔊' : '🎵';

    if (musicPlaying) {
      noteIndex = 0;
      playMelody();
      musicInterval = setInterval(playMelody, 800);
    } else {
      clearInterval(musicInterval);
    }
  }

  // ==================== PHOTO ALBUM ====================
  const photoTrack = document.getElementById('photoTrack');
  const photoDots = document.getElementById('photoDots');
  const slides = photoTrack.querySelectorAll('.photo-slide');
  let currentSlide = 0;
  const totalSlides = slides.length;

  if (totalSlides > 1) {
    slides.forEach((_, i) => {
      const dot = document.createElement('span');
      dot.className = 'photo-dot' + (i === 0 ? ' active' : '');
      photoDots.appendChild(dot);
    });

    setInterval(() => {
      currentSlide = (currentSlide + 1) % totalSlides;
      photoTrack.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
      photoDots.querySelectorAll('.photo-dot').forEach((d, i) => {
        d.classList.toggle('active', i === currentSlide);
      });
    }, 3500);
  }

  // ==================== BLIND BOXES ====================
  let openCount = 0;
  let prizeClaimed = false;

  const cardContents = {
    love: { emoji: '💌', text: '"每一次争吵过后，<br>我都比昨天更爱你一点。<br>因为你，我愿意慢慢变好。"' },
    sweet: { emoji: '🌟', text: '"你是藏在满天星光里<br>最亮的那一颗，<br>也是我心里最甜的秘密。"' }
  };

  function showCard(content) {
    const popup = document.getElementById('cardPopup');
    popup.innerHTML = `
      <span class="card-emoji">${content.emoji}</span>
      ${content.text}
      <div class="card-close">轻触任意处关闭</div>
    `;
    document.getElementById('overlay').classList.add('show');
    popup.classList.add('show');
  }

  function closeCard() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('cardPopup').classList.remove('show');
  }

  function openBox(boxNum) {
    const boxEl = document.querySelector(`.blind-box[data-box="${boxNum}"]`);
    if (boxEl.classList.contains('opened') || boxEl.classList.contains('prize-opened')) return;

    boxEl.classList.add('opening');
    boxEl.style.animation = 'shake 0.5s ease';

    openCount++;

    setTimeout(() => {
      boxEl.classList.remove('opening');
      boxEl.style.animation = '';

      if (openCount === 2 && !prizeClaimed) {
        boxEl.classList.add('prize-opened');
        prizeClaimed = true;
        unlockIPad();
      } else {
        boxEl.classList.add('opened');
        const content = openCount === 1 ? cardContents.love : cardContents.sweet;
        showCard(content);
      }
    }, 600);
  }

  function unlockIPad() {
    const screen = document.getElementById('ipadScreen');
    const question = document.getElementById('ipadQuestion');
    const prize = document.getElementById('ipadPrize');
    const led = document.getElementById('ipadLed');
    const wrapper = document.getElementById('ipadWrapper');

    document.getElementById('ipadQuestion').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('ipadQuestion').style.display = 'none';
      document.getElementById('ipadPrize').classList.add('show');
      document.getElementById('ipadScreen').classList.add('unlocked-screen');
      document.getElementById('ipadLed').classList.add('on');
      document.getElementById('ipadWrapper').classList.add('unlocked');
      spawnConfetti();
    }, 400);
  }

  function spawnConfetti() {
    const container = document.getElementById('confettiContainer');
    const colors = ['#ff6b9d','#ffd700','#ff9ec4','#c4a4ff','#7ec8e3','#ffb347','#66ff66','#ff6b6b'];
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.top = -(Math.random() * 60 + 10) + 'px';
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (Math.random() * 8 + 6) + 'px';
      piece.style.height = (Math.random() * 8 + 6) + 'px';
      piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
      piece.style.animationDelay = Math.random() * 1 + 's';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      container.appendChild(piece);
      setTimeout(() => piece.remove(), 4000);
    }
    setTimeout(() => showCard({
      emoji: '🎉',
      text: '🎁 iPad 已解锁～<br>快来找我领礼物吧！<br>爱你，小羊 ❤️'
    }), 1500);
  }

  // 绑定事件
  document.querySelectorAll('.blind-box').forEach(box => {
    box.addEventListener('click', (e) => {
      e.preventDefault();
      openBox(parseInt(box.dataset.box));
    });
  });
  document.getElementById('musicBtn').addEventListener('click', toggleMusic);
  document.getElementById('overlay').addEventListener('click', closeCard);

  // 首次用户交互时初始化音频上下文
  document.addEventListener('click', initAudio, { once: true });
  document.addEventListener('touchstart', initAudio, { once: true });

  requestAnimationFrame(animate);

  // iPhone 安全区域适配
  document.documentElement.style.setProperty('--safe-bottom',
    'env(safe-area-inset-bottom, 0px)');
})();
</script>
</body>
</html>
